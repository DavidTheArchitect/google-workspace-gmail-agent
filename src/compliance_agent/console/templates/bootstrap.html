<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connect · Gmail Compliance Agent</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/styles.css">
  <script defer src="/static/bootstrap.js"></script>
</head>
<body class="bootstrap-page">
  <main class="bootstrap-panel">
    <span class="brand-mark large" aria-hidden="true">✓</span>
    <h1>Connect to your local console</h1>
    <p>The launch token stays on this device and is exchanged once for an attended session.</p>
    <form method="post" action="/bootstrap" id="bootstrap-form">
      <label for="bootstrap-token">Launch token</label>
      <input id="bootstrap-token" name="token" type="password" autocomplete="off" required>
      <button class="button primary" type="submit">Open console</button>
    </form>
  </main>
</body>
</html>
