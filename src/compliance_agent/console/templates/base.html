<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{% block title %}Gmail Compliance Agent{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  <script defer src="{{ url_for('static', path='/htmx.min.js') }}"></script>
  <script defer src="{{ url_for('static', path='/sse.js') }}"></script>
  <script defer src="{{ url_for('static', path='/console.js') }}"></script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="topbar">
    <a class="brand" href="/" aria-label="Gmail Compliance Agent dashboard">
      <span class="brand-mark" aria-hidden="true">✓</span>
      <span>Gmail Compliance Agent</span>
    </a>
    <div class="topbar-status"><span class="status-dot"></span> Local only</div>
  </header>
  <div class="app-shell">
    <nav class="sidebar" aria-label="Primary navigation">
      <div class="nav-primary">
        <a href="/" class="nav-link {% if active_path == '/' %}active{% endif %}"><span class="nav-glyph" aria-hidden="true">⌂</span>Dashboard</a>
        <a href="/runs/new" class="nav-link {% if active_path.startswith('/runs') %}active{% endif %}"><span class="nav-glyph" aria-hidden="true">＋</span>New change</a>
        <a href="/readiness" class="nav-link {% if active_path == '/readiness' %}active{% endif %}"><span class="nav-glyph" aria-hidden="true">✓</span>Readiness</a>
        <a href="/contracts" class="nav-link {% if active_path == '/contracts' %}active{% endif %}"><span class="nav-glyph" aria-hidden="true">⌘</span>UI contracts</a>
        <a href="/ownership" class="nav-link {% if active_path == '/ownership' %}active{% endif %}"><span class="nav-glyph" aria-hidden="true">◇</span>Ownership</a>
        <a href="/audits" class="nav-link {% if active_path.startswith('/audits') %}active{% endif %}"><span class="nav-glyph" aria-hidden="true">▤</span>Audit</a>
        <a href="/propagation" class="nav-link {% if active_path == '/propagation' %}active{% endif %}"><span class="nav-glyph" aria-hidden="true">◉</span>Propagation</a>
      </div>
      <div class="sidebar-foot">
        <span class="system-state"><span class="status-dot"></span> System healthy</span>
      </div>
    </nav>
    <main id="main-content" class="main-content" tabindex="-1">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
