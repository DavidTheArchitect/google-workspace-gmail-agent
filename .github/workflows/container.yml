name: container

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=sha,format=long
            type=ref,event=pr
            type=raw,value=local-smoke,enable=${{ github.event_name == 'pull_request' }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ github.event_name == 'push' && 'mode=max' || 'false' }}
          sbom: ${{ github.event_name == 'push' }}

      - name: Smoke-test pull request image
        if: github.event_name == 'pull_request'
        env:
          METADATA_JSON: ${{ steps.metadata.outputs.json }}
        run: |
          IMAGE=$(jq -r '.tags[] | select(endswith(":local-smoke"))' <<<"$METADATA_JSON")
          docker run --detach --name gmail-agent-smoke \
            --publish 127.0.0.1:8765:8765 "$IMAGE"
          cleanup() {
            docker logs gmail-agent-smoke || true
            docker rm --force gmail-agent-smoke || true
          }
          trap cleanup EXIT
          # Reflex verifies its prebuilt frontend before opening the single-port server.
          for attempt in {1..180}; do
            if ! status=$(docker inspect --format='{{.State.Health.Status}}' gmail-agent-smoke); then
              exit 1
            fi
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            if [ "$status" = "unhealthy" ]; then
              exit 1
            fi
            sleep 1
          done
          exit 1
