name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.23"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Synchronize locked development environment
        run: uv sync --locked --extra dev
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint Python
        run: uv run ruff check .
      - name: Check Markdown
        run: uv run pre-commit run markdownlint-cli2 --all-files
      - name: Check shell launchers
        run: bash -n Setup-Gmail-Agent.sh Start-Gmail-Agent.sh
      - name: Type-check application
        run: uv run mypy --strict src
      - name: Run tests and coverage gate
        run: uv run pytest
      - name: Audit dependencies
        run: uv run pip-audit
      - name: Scan tracked files for obvious secrets
        run: |
          if git grep -nE '(BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|AIza[0-9A-Za-z_-]{35})'; then
            exit 1
          fi

  platform-launchers:
    name: launcher (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.23"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Synchronize locked development environment
        run: uv sync --locked --extra dev
      - name: Check platform launcher contracts
        run: uv run pytest tests/unit/test_launch_scripts.py --no-cov -q
